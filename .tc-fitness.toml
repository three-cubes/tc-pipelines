# Self-test fixture gate for python-quality-gate.yml's sharding path.
# A single shardable `run` step: the probe echoes the argv it receives so the
# self-test can prove `--shard i/N` appended the substituted shard_args and the
# engine set COVERAGE_FILE. Not a real gate — exercised only by test-shard-routing.yml.
name = "shard self-test fixture"

[[steps]]
id = "probe"
summary = "shard probe (echoes injected shard args)"
run = ["python3", "shard_probe.py"]
shard_args = ["--split", "{index}", "of", "{total}"]
