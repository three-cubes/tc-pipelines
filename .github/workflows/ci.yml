---
name: tc-pipelines self-check
on:
  push: { branches: [main] }
  pull_request:
permissions:
  contents: read
jobs:
  # Dogfood: tc-pipelines runs the very meta gate it ships. A local-path
  # `uses:` (./.github/workflows/meta-quality-gate.yml) wires this self-check to
  # the reusable's actionlint / yamllint / license / branch-naming legs, so a
  # regression in the shipped gate fails HERE before any consumer adopts it.
  # yamllint scans all three YAML roots: the reusable workflows, the CI install
  # composites (top-level actions/), and the Azure deploy composites
  # (.github/actions/). The LICENSE assertion expects Apache-2.0.
  meta:
    uses: ./.github/workflows/meta-quality-gate.yml
    with:
      yamllint-paths: ".github/workflows actions .github/actions"
      spdx-id: "Apache-2.0"
      # no-attribution is emitted as the standalone `no-attribution` job below so
      # it surfaces the BARE status context the canonical org-main-core ruleset
      # gates on (a nested `meta / no-attribution` cannot satisfy it). Kept off
      # here so the scan runs once.
      run-no-attribution: false

  # Fan-in aggregator: a single check-run that is green iff the whole `meta`
  # self-check passed. auto-merge.yml arms `--auto` off THIS check-run name, so
  # it is the one stable gate a ruleset or consumer points at.
  quality-gate:
    name: Quality gate
    needs: meta
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Assert the meta self-check succeeded
        run: test "${{ needs.meta.result }}" = "success"

  # no-attribution — the BARE required status context org-main-core gates on.
  # Runs the shared tc-fitness detector over the PR commit range + title/body
  # (Autonomous Delivery Platform D1), matching every other repo's canonical job.
  no-attribution:
    name: no-attribution
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # pinned (org standard)
      - name: Reject AI/LLM self-attribution in commits + PR title/body
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          module="tc_fitness.core_checks.no_llm_attribution"
          from="git+https://github.com/three-cubes/tc-fitness@v0.14.1"
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          rc=0
          scan() {
            if ! uvx --from "$from" python -m "$module" --scan-file "$2"; then
              echo "::error::no-attribution: AI/LLM self-attribution residue in $1." >&2
              rc=1
            fi
          }
          scan_advisory() {
            if ! uvx --from "$from" python -m "$module" --scan-file "$2"; then
              echo "::warning::no-attribution: possible residue in $1 (advisory — confirm it is documentation)." >&2
            fi
          }
          shas="$(git rev-list "${PR_BASE_SHA}..${PR_HEAD_SHA}")"
          while IFS= read -r sha; do
            [[ -z "$sha" ]] && continue
            git log -1 --format=%B "$sha" > "$workdir/commit-${sha}.txt"
            scan "commit ${sha} message" "$workdir/commit-${sha}.txt"
          done <<< "$shas"
          printf '%s' "$PR_TITLE" > "$workdir/pr-title.txt"
          scan "PR title" "$workdir/pr-title.txt"
          printf '%s' "$PR_BODY" > "$workdir/pr-body.txt"
          scan_advisory "PR body" "$workdir/pr-body.txt"
          if [[ "$rc" -ne 0 ]]; then
            echo "::error::no-attribution: remove the AI/LLM self-attribution flagged above." >&2
          fi
          exit "$rc"
