name: example-callers (reusable self-check dispatcher)

# Thin dispatcher for the DRY self-check of the Phase 4 reusable workflows.
#
# ── Why this file is thin now (parallel-dev friction fix) ────────────────────
# This USED to be one monolith holding every reusable's example-caller jobs.
# Every reusable's PR appended its jobs to this single file, so parallel PRs
# collided here on every merge. The example jobs now live ONE-FILE-PER-REUSABLE
# in `example-<reusable>.yml` (see the table below). Adding a reusable adds a NEW
# file — it never edits a shared one — so additions no longer serialize.
#
# The load-bearing static call-graph check runs PER FILE: actionlint (and
# GitHub's reusable-workflow resolver) validate each `example-<reusable>.yml`'s
# `uses:` call shapes against the real reusable's `workflow_call:` contract at
# parse time, whether or not this dispatcher references it. So a caller mismatch
# still fails HERE, in tc-pipelines' own CI, not in a consumer's pipeline.
#
# This dispatcher only aggregates the per-reusable files behind ONE
# `workflow_dispatch` entry point and fans `run-for-real` through to them, so a
# maintainer can still trigger the whole set from one place.
#
# ── Convention: adding an example for a new reusable ─────────────────────────
#   1. Add `.github/workflows/example-<reusable>.yml` (copy an existing one; it's
#      a `workflow_call` reusable with a `run-for-real` input, every job gated on
#      `if: ${{ inputs.run-for-real }}`). That file alone gives you the static
#      call-graph check — no shared file is touched, so it can't collide.
#   2. OPTIONAL: add a one-line fan-out job below (kept alphabetical to spread out
#      insertions and minimise conflicts) so the new file also runs from this
#      dispatcher.
#
# Files live at the TOP LEVEL of `.github/workflows/` (not a subdirectory):
# GitHub Actions does not register or run workflow files in subdirectories of
# `.github/workflows/`, and subdirectory reusable `uses:` paths are unsupported —
# so per-reusable files must be top-level to be dispatchable + resolvable. The
# `example-` prefix keeps them grouped.
#
# ── Per-reusable example files ───────────────────────────────────────────────
#   docker-build-publish → example-docker-build-publish.yml  (HITL — gated off)
#   event-dispatch       → example-event-dispatch.yml
#   fresh-install-smoke  → example-fresh-install-smoke.yml
#   mutation-gate        → example-mutation-gate.yml
#   publish-pypi         → example-publish-pypi.yml           (HITL — gated off)
#   python-quality-gate  → example-python-quality-gate.yml
#   release              → example-release.yml                (HITL — gated off)
#   require-work-item    → example-require-work-item.yml
#   security-scan        → example-security-scan.yml
#   sonar-scan           → example-sonar-scan.yml
#   verify-and-close     → example-verify-and-close.yml
#
# NEVER runs the underlying work by default: `workflow_dispatch` only (never on
# push/PR) and every per-reusable job is gated on `run-for-real`, whose default
# is false. The call graph is validated statically regardless of the gate; the
# bodies (real Dockerfiles, kairix/taz scripts, a SonarCloud token, the release
# path) never execute under the default dispatch. The release/docker/publish-pypi
# jobs MUST stay gated: they touch the HITL release path (feedback_release_hitl /
# G4) and would only ever run with explicit per-action authorization + real
# secrets wired, which this self-check deliberately does not carry.
#
# Part of three-cubes/kairix#499 Phase 4 (org CI consolidation).

on:
  workflow_dispatch:
    inputs:
      run-for-real:
        description: >-
          Leave false (default) for the static call-graph self-check — every
          per-reusable job stays gated off and only the input/secret SHAPES are
          validated. Flipping to true would attempt to actually run the
          reusables, which needs real repo scripts / images / tokens and (for
          release + docker + publish-pypi) explicit HITL authorization; this
          self-check is not the place for that.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # Fan out to every per-reusable example file. Keep ALPHABETICAL by reusable so
  # new entries slot into distinct positions (spread-out inserts minimise merge
  # conflicts). Each is a static call-graph check in its own right (see header).
  docker-build-publish:
    uses: ./.github/workflows/example-docker-build-publish.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  event-dispatch:
    uses: ./.github/workflows/example-event-dispatch.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  fresh-install-smoke:
    uses: ./.github/workflows/example-fresh-install-smoke.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  mutation-gate:
    uses: ./.github/workflows/example-mutation-gate.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  publish-pypi:
    uses: ./.github/workflows/example-publish-pypi.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  python-quality-gate:
    uses: ./.github/workflows/example-python-quality-gate.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  release:
    uses: ./.github/workflows/example-release.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  require-work-item:
    uses: ./.github/workflows/example-require-work-item.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  security-scan:
    uses: ./.github/workflows/example-security-scan.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  sonar-scan:
    uses: ./.github/workflows/example-sonar-scan.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}

  verify-and-close:
    uses: ./.github/workflows/example-verify-and-close.yml
    with:
      run-for-real: ${{ inputs.run-for-real }}
