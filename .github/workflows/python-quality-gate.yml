---
name: python-quality-gate

# Reusable (workflow_call) Python quality gate for three-cubes repos.
#
# The gate's STEPS are owned by the fitness engine (three-cubes-fitness, the
# `tc-fitness` CLI), not by this workflow. The consuming repo declares its gate
# — dep-install, the exact pytest invocation (test dirs + --cov roots + markers
# + -n auto), ruff/bandit targets, detect-secrets baseline, and its
# check-catalogue module — in a repo-local `[tool.tc_fitness]` block (or
# `.tc-fitness.toml`). `uv run tc-fitness run` reads that config and runs the
# gate in order from one Python entrypoint. The SAME binary + SAME config is
# what `make check` runs locally, so local == CI by construction.
#
# This workflow therefore owns only the GitHub Actions ENVIRONMENT around that
# one command: provisioning a pinned/cached uv venv, the optional Node/TS half
# (a separate ecosystem the Python engine does not orchestrate), repo-specific
# pre/post orchestration hooks, and the coverage-artifact handoff to
# `sonar-scan.yml`. Repo-specific gate STEPS are config in the engine, never
# inputs here — that is the whole point of the convergence.
#
# Part of three-cubes/kairix#499 Phase 4 (org CI consolidation).

on:
  workflow_call:
    inputs:
      # ── Toolchain pins (forwarded to setup-uv-cached) ───────────────────
      python-version:
        description: "Python version uv resolves against."
        type: string
        default: "3.12"
      uv-version:
        description: "Pinned uv version (org standard)."
        type: string
        default: "0.11.16"
      fetch-depth:
        description: "checkout fetch-depth. 0 = full history (secret scanning / new-code); 2 = HEAD~1 for changed-file diffs."
        type: number
        default: 2
      # ── Install surface (forwarded to setup-uv-cached) ──────────────────
      sync-args:
        description: >-
          Arguments to `uv sync`. Workspace repos use `--locked --all-packages`;
          single-package repos use e.g. `--all-extras --all-groups`. Must agree
          with the dep-install the engine config declares for local runs.
        type: string
        default: "--locked --all-packages"
      ci-requirements-path:
        description: >-
          `--require-hashes` requirements file for CI-only tools installed into
          the same .venv before the gate runs. Empty string skips the step.
        type: string
        default: ".github/requirements-ci.txt"
      # ── The gate ────────────────────────────────────────────────────────
      tc-fitness-args:
        description: >-
          Arguments to the engine CLI. Default `run` executes the full gate
          declared in the repo's `[tool.tc_fitness]` config. Override e.g.
          `run --changed-files-from .tc-fitness-changed-files`.
        type: string
        default: "run"
      write-changed-files:
        description: >-
          Write a newline-delimited repo-relative changed-file list before the
          gate. Pair with `tc-fitness-args: run --changed-files-from <path>` for
          the diff-scoped PR smoke tier.
        type: boolean
        default: false
      changed-files-path:
        description: >-
          Repo-relative file path written when `write-changed-files` is true.
          Must match the path passed to `tc-fitness run --changed-files-from`.
        type: string
        default: ".tc-fitness-changed-files"
      run-no-attribution:
        description: >-
          Reject AI/LLM self-attribution residue in the PR's commit messages and
          in the PR title + body (Autonomous Delivery Platform decision D1),
          symmetric with the meta gate's leg. Uses the repo's ALREADY-installed
          tc-fitness `no_llm_attribution` detector in READ-ONLY mode (`--scan-file`
          — never rewrites history); the file-residue + canonical-identity range
          checks stay owned by `tc-fitness run` via `[tool.tc_fitness]` config.
          Full commit-range coverage needs `fetch-depth: 0` (as the engine's
          range/secret-scan checks already do); otherwise only the tip commit +
          title/body are scanned.
        type: boolean
        default: true
      pre-steps:
        description: >-
          Optional bash run before `tc-fitness run`, for repo-specific
          orchestration that genuinely cannot be a config-declared check
          (e.g. a render smoke). Empty string skips.
        type: string
        default: ""
      post-steps:
        description: >-
          Optional bash run after `tc-fitness run` (always runs unless the gate
          step itself was skipped). Empty string skips.
        type: string
        default: ""
      # ── Coverage-artifact handoff to sonar-scan.yml ─────────────────────
      upload-coverage-artifact:
        description: "Upload the engine-produced coverage XML as an artifact for the downstream Sonar scan."
        type: boolean
        default: true
      coverage-xml-path:
        description: >-
          Path the engine writes coverage XML to (must match the repo's
          sonar-project.properties `sonar.python.coverage.reportPaths`).
        type: string
        default: "coverage.xml"
      coverage-artifact-name:
        description: "Artifact name the downstream sonar-scan job downloads."
        type: string
        default: "coverage-data"
      # ── Node / TS half (opt-in — a separate ecosystem) ──────────────────
      run-node:
        description: "Run the pnpm/TS half (install + TS coverage) alongside the Python gate."
        type: boolean
        default: false
      node-version-file:
        description: "Path to the Node version file (.nvmrc) when run-node is true."
        type: string
        default: ".nvmrc"
      pnpm-version:
        description: "pnpm version to install when run-node is true."
        type: string
        default: "10.27.0"
      pnpm-install-args:
        description: "Args for `pnpm install` when run-node is true."
        type: string
        default: "--frozen-lockfile --ignore-scripts"
      ts-coverage-command:
        description: "Command run for the TS coverage half when run-node is true."
        type: string
        default: "pnpm -r --if-present test:coverage"
      pytest-shards:
        description: >-
          Number of parallel shards to split the gate's pytest step across. Default
          1 = a single byte-identical `quality` job (the check name + behaviour are
          unchanged). >1 fans the gate into N matrix runners each invoking
          `tc-fitness run --shard i/N` (only steps declaring `shard_args` in the
          repo's `[tool.tc_fitness]` are split), then a `coverage-combine` job merges
          the shard `.coverage.<i>` files into the single XML the sonar handoff
          consumes. Requires the repo to declare `shard_args` on its pytest step and
          commit a `.test_durations` map (see tc-fitness `--shard`, ≥ v0.9.0).
        type: number
        default: 1
    secrets:
      gh-token:
        description: "GITHUB_TOKEN override for steps that need authenticated git/gh (engine secret-scan changed-file diff). Falls back to github.token."
        required: false

permissions:
  contents: read

jobs:
  # Default (pytest-shards == 1): ONE byte-identical job. The name is preserved so
  # existing consumers' required-status-check context is unchanged; the sharded
  # jobs below are skipped and never required.
  quality:
    name: Python quality gate
    if: ${{ inputs.pytest-shards <= 1 }}
    runs-on: ubuntu-latest
    steps:
      - name: Run the gate (unsharded)
        uses: three-cubes/tc-pipelines/actions/python-gate-body@dan/sgo-264-tc-pipelines-shard-matrix
        with:
          python-version: ${{ inputs.python-version }}
          uv-version: ${{ inputs.uv-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements-path: ${{ inputs.ci-requirements-path }}
          fetch-depth: ${{ inputs.fetch-depth }}
          tc-fitness-args: ${{ inputs.tc-fitness-args }}
          write-changed-files: ${{ inputs.write-changed-files }}
          changed-files-path: ${{ inputs.changed-files-path }}
          run-no-attribution: ${{ inputs.run-no-attribution }}
          pre-steps: ${{ inputs.pre-steps }}
          post-steps: ${{ inputs.post-steps }}
          run-node: ${{ inputs.run-node }}
          node-version-file: ${{ inputs.node-version-file }}
          pnpm-version: ${{ inputs.pnpm-version }}
          pnpm-install-args: ${{ inputs.pnpm-install-args }}
          ts-coverage-command: ${{ inputs.ts-coverage-command }}
          gh-token: ${{ secrets.gh-token || github.token }}
          upload-coverage-artifact: ${{ inputs.upload-coverage-artifact }}
          coverage-xml-path: ${{ inputs.coverage-xml-path }}
          coverage-artifact-name: ${{ inputs.coverage-artifact-name }}
          shard-index:
          shard-total:

  # ── Sharded path (pytest-shards > 1) ────────────────────────────────────────
  # Build the [1..N] matrix (no range function in Actions expressions).
  shards:
    if: ${{ inputs.pytest-shards > 1 }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        env:
          N: ${{ inputs.pytest-shards }}
        run: |
          set -euo pipefail
          # [1,2,...,N] — seq builds the comma list; the brackets make it JSON.
          echo "matrix=[$(seq -s, 1 "$N")]" >> "$GITHUB_OUTPUT"

  # Each shard runs the whole gate with `tc-fitness run --shard i/N`; only steps
  # declaring `shard_args` split (pytest), so the non-pytest legs re-run per shard
  # (cheap relative to the pytest win) while pytest wall-clock drops ~1/N.
  quality-shard:
    needs: shards
    if: ${{ inputs.pytest-shards > 1 }}
    name: Python quality gate (shard ${{ matrix.shard }}/${{ inputs.pytest-shards }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.shards.outputs.matrix) }}
    steps:
      - name: Run the gate (shard ${{ matrix.shard }}/${{ inputs.pytest-shards }})
        uses: three-cubes/tc-pipelines/actions/python-gate-body@dan/sgo-264-tc-pipelines-shard-matrix
        with:
          python-version: ${{ inputs.python-version }}
          uv-version: ${{ inputs.uv-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements-path: ${{ inputs.ci-requirements-path }}
          fetch-depth: ${{ inputs.fetch-depth }}
          tc-fitness-args: ${{ inputs.tc-fitness-args }}
          write-changed-files: ${{ inputs.write-changed-files }}
          changed-files-path: ${{ inputs.changed-files-path }}
          run-no-attribution: ${{ inputs.run-no-attribution }}
          pre-steps: ${{ inputs.pre-steps }}
          post-steps: ${{ inputs.post-steps }}
          run-node: ${{ inputs.run-node }}
          node-version-file: ${{ inputs.node-version-file }}
          pnpm-version: ${{ inputs.pnpm-version }}
          pnpm-install-args: ${{ inputs.pnpm-install-args }}
          ts-coverage-command: ${{ inputs.ts-coverage-command }}
          gh-token: ${{ secrets.gh-token || github.token }}
          upload-coverage-artifact: ${{ inputs.upload-coverage-artifact }}
          coverage-xml-path: ${{ inputs.coverage-xml-path }}
          coverage-artifact-name: ${{ inputs.coverage-artifact-name }}
          shard-index: ${{ matrix.shard }}
          shard-total: ${{ inputs.pytest-shards }}

  # Merge the shard `.coverage.<i>` files → the single coverage XML the sonar
  # handoff consumes. always() so a shard FAIL that still produced partial
  # coverage does not strand the report.
  coverage-combine:
    needs: quality-shard
    if: ${{ always() && inputs.pytest-shards > 1 && inputs.upload-coverage-artifact }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Locked uv install
        uses: three-cubes/tc-pipelines/actions/setup-uv-cached@v1
        with:
          uv-version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.python-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements: ${{ inputs.ci-requirements-path }}
      - name: Download shard coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: ${{ inputs.coverage-artifact-name }}-shard-*
          merge-multiple: true
      - name: Combine shard coverage → XML
        shell: bash
        env:
          COVERAGE_XML: ${{ inputs.coverage-xml-path }}
        run: |
          # NOT `set -e`: `coverage combine` exits non-zero when it SKIPS an
          # empty/partial shard file (e.g. a shard whose tests were all filtered),
          # but the files it DID combine are still valid. Tolerate that and gate on
          # whether a combined `.coverage` was actually produced.
          set -uo pipefail
          shopt -s nullglob
          shards=(.coverage.*)
          if [[ ${#shards[@]} -eq 0 ]]; then
            echo "::warning::no shard coverage data found; skipping combine."
            exit 0
          fi
          echo "combining ${#shards[@]} shard file(s): ${shards[*]}"
          uv run coverage combine "${shards[@]}" || echo "::warning::coverage combine skipped an empty/partial shard file (kept the rest)."
          if [[ -f .coverage ]]; then
            uv run coverage xml -o "$COVERAGE_XML"
          else
            echo "::warning::no combined coverage data produced; no XML written."
          fi
      - name: Upload combined coverage XML
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.coverage-xml-path }}
          if-no-files-found: ignore
