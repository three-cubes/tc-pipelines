---
name: python-quality-gate

# Reusable (workflow_call) Python quality gate for three-cubes repos.
#
# The gate's STEPS are owned by the fitness engine (three-cubes-fitness, the
# `tc-fitness` CLI), not by this workflow. The consuming repo declares its gate
# — dep-install, the exact pytest invocation (test dirs + --cov roots + markers
# + -n auto), ruff/bandit targets, detect-secrets baseline, and its
# check-catalogue module — in a repo-local `[tool.tc_fitness]` block (or
# `.tc-fitness.toml`). `uv run tc-fitness run` reads that config and runs the
# gate in order from one Python entrypoint. The SAME binary + SAME config is
# what `make check` runs locally, so local == CI by construction.
#
# This workflow therefore owns only the GitHub Actions ENVIRONMENT around that
# one command: provisioning a pinned/cached uv venv, the optional Node/TS half
# (a separate ecosystem the Python engine does not orchestrate), repo-specific
# pre/post orchestration hooks, and the coverage-artifact handoff to
# `sonar-scan.yml`. Repo-specific gate STEPS are config in the engine, never
# inputs here — that is the whole point of the convergence.
#
# Part of three-cubes/kairix#499 Phase 4 (org CI consolidation).

on:
  workflow_call:
    inputs:
      # ── Toolchain pins (forwarded to setup-uv-cached) ───────────────────
      python-version:
        description: "Python version uv resolves against."
        type: string
        default: "3.12"
      uv-version:
        description: "Pinned uv version (org standard)."
        type: string
        default: "0.11.16"
      fetch-depth:
        description: "checkout fetch-depth. 0 = full history (secret scanning / new-code); 2 = HEAD~1 for changed-file diffs."
        type: number
        default: 2
      # ── Install surface (forwarded to setup-uv-cached) ──────────────────
      sync-args:
        description: >-
          Arguments to `uv sync`. Workspace repos use `--locked --all-packages`;
          single-package repos use e.g. `--all-extras --all-groups`. Must agree
          with the dep-install the engine config declares for local runs.
        type: string
        default: "--locked --all-packages"
      ci-requirements-path:
        description: >-
          `--require-hashes` requirements file for CI-only tools installed into
          the same .venv before the gate runs. Empty string skips the step.
        type: string
        default: ".github/requirements-ci.txt"
      # ── The gate ────────────────────────────────────────────────────────
      tc-fitness-args:
        description: >-
          Arguments to the engine CLI. Default `run` executes the full gate
          declared in the repo's `[tool.tc_fitness]` config. Override e.g.
          `run --changed-files-from .tc-fitness-changed-files`.
        type: string
        default: "run"
      write-changed-files:
        description: >-
          Write a newline-delimited repo-relative changed-file list before the
          gate. Pair with `tc-fitness-args: run --changed-files-from <path>` for
          the diff-scoped PR smoke tier.
        type: boolean
        default: false
      changed-files-path:
        description: >-
          Repo-relative file path written when `write-changed-files` is true.
          Must match the path passed to `tc-fitness run --changed-files-from`.
        type: string
        default: ".tc-fitness-changed-files"
      run-no-attribution:
        description: >-
          Reject AI/LLM self-attribution residue in the PR's commit messages and
          in the PR title + body (Autonomous Delivery Platform decision D1),
          symmetric with the meta gate's leg. Uses the repo's ALREADY-installed
          tc-fitness `no_llm_attribution` detector in READ-ONLY mode (`--scan-file`
          — never rewrites history); the file-residue + canonical-identity range
          checks stay owned by `tc-fitness run` via `[tool.tc_fitness]` config.
          Full commit-range coverage needs `fetch-depth: 0` (as the engine's
          range/secret-scan checks already do); otherwise only the tip commit +
          title/body are scanned.
        type: boolean
        default: true
      pre-steps:
        description: >-
          Optional bash run before `tc-fitness run`, for repo-specific
          orchestration that genuinely cannot be a config-declared check
          (e.g. a render smoke). Empty string skips.
        type: string
        default: ""
      post-steps:
        description: >-
          Optional bash run after `tc-fitness run` (always runs unless the gate
          step itself was skipped). Empty string skips.
        type: string
        default: ""
      # ── Coverage-artifact handoff to sonar-scan.yml ─────────────────────
      upload-coverage-artifact:
        description: "Upload the engine-produced coverage XML as an artifact for the downstream Sonar scan."
        type: boolean
        default: true
      coverage-xml-path:
        description: >-
          Path the engine writes coverage XML to (must match the repo's
          sonar-project.properties `sonar.python.coverage.reportPaths`).
        type: string
        default: "coverage.xml"
      coverage-artifact-name:
        description: "Artifact name the downstream sonar-scan job downloads."
        type: string
        default: "coverage-data"
      # ── Node / TS half (opt-in — a separate ecosystem) ──────────────────
      run-node:
        description: "Run the pnpm/TS half (install + TS coverage) alongside the Python gate."
        type: boolean
        default: false
      node-version-file:
        description: "Path to the Node version file (.nvmrc) when run-node is true."
        type: string
        default: ".nvmrc"
      pnpm-version:
        description: "pnpm version to install when run-node is true."
        type: string
        default: "10.27.0"
      pnpm-install-args:
        description: "Args for `pnpm install` when run-node is true."
        type: string
        default: "--frozen-lockfile --ignore-scripts"
      ts-coverage-command:
        description: "Command run for the TS coverage half when run-node is true."
        type: string
        default: "pnpm -r --if-present test:coverage"
    secrets:
      gh-token:
        description: "GITHUB_TOKEN override for steps that need authenticated git/gh (engine secret-scan changed-file diff). Falls back to github.token."
        required: false

permissions:
  contents: read

jobs:
  quality:
    name: Python quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      # ── Node / pnpm half (opt-in) ───────────────────────────────────────
      - name: Set up pnpm
        if: inputs.run-node
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ inputs.pnpm-version }}
      - name: Set up Node
        if: inputs.run-node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm
      - name: pnpm install
        if: inputs.run-node
        shell: bash
        run: pnpm install ${{ inputs.pnpm-install-args }}

      # ── Locked-uv install (org composite, self-pinned to v1) ────────────
      # Provisions the pinned/cached uv venv + repo deps + optional CI tools so
      # `tc-fitness run` has its interpreter and dependencies ready.
      - name: Locked uv install
        uses: three-cubes/tc-pipelines/actions/setup-uv-cached@v1
        with:
          uv-version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.python-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements: ${{ inputs.ci-requirements-path }}

      # ── Diff-scoped smoke support (opt-in) ─────────────────────────────
      - name: Write changed-file list
        if: inputs.write-changed-files
        shell: bash
        env:
          CHANGED_FILES_PATH: ${{ inputs.changed-files-path }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "$CHANGED_FILES_PATH" || "$CHANGED_FILES_PATH" = /* || "$CHANGED_FILES_PATH" == *".."* ]]; then
            echo "::error::changed-files-path must be a non-empty repo-relative path without '..': '$CHANGED_FILES_PATH'." >&2
            exit 1
          fi

          ensure_commit() {
            local sha="$1"
            [[ -z "$sha" ]] && return 0
            git cat-file -e "${sha}^{commit}" 2>/dev/null && return 0
            git fetch --no-tags --depth=1 origin "$sha"
          }

          zero_sha="0000000000000000000000000000000000000000"
          base=""
          head=""
          if [[ -n "${PR_BASE_SHA:-}" && -n "${PR_HEAD_SHA:-}" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          elif [[ -n "${PUSH_BEFORE_SHA:-}" && "$PUSH_BEFORE_SHA" != "$zero_sha" ]]; then
            base="$PUSH_BEFORE_SHA"
            head="$PUSH_AFTER_SHA"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            base="HEAD~1"
            head="HEAD"
          else
            mkdir -p "$(dirname -- "$CHANGED_FILES_PATH")"
            git ls-files > "$CHANGED_FILES_PATH"
            count="$(wc -l < "$CHANGED_FILES_PATH" | tr -d ' ')"
            echo "changed-files: wrote $count tracked path(s) to $CHANGED_FILES_PATH (initial checkout fallback)."
            exit 0
          fi

          ensure_commit "$base"
          ensure_commit "$head"
          mkdir -p "$(dirname -- "$CHANGED_FILES_PATH")"
          git diff --name-only "$base...$head" > "$CHANGED_FILES_PATH"
          count="$(wc -l < "$CHANGED_FILES_PATH" | tr -d ' ')"
          echo "changed-files: wrote $count path(s) to $CHANGED_FILES_PATH."

      # ── Repo-specific pre-orchestration (opt-in) ────────────────────────
      - name: Pre-steps
        if: inputs.pre-steps != ''
        shell: bash
        run: ${{ inputs.pre-steps }}

      # ── THE GATE — one binary, the repo's own config ────────────────────
      # `tc-fitness run` reads `[tool.tc_fitness]` (or .tc-fitness.toml) from
      # the checked-out repo and runs the declared gate in order. This is the
      # SAME command `make check` runs locally — local == CI by construction.
      - name: Fitness gate
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.gh-token || github.token }}
        run: uv run tc-fitness ${{ inputs.tc-fitness-args }}

      # ── No-attribution message scan (symmetric with the meta gate) ──────
      # `tc-fitness run` above already scans in-repo FILES for attribution
      # residue and gates commit IDENTITY over the range (both via the repo's
      # [tool.tc_fitness] config). This step covers the surfaces that are NOT
      # files: the PR's commit MESSAGES and the PR title/body — reusing the SAME
      # already-installed `no_llm_attribution` detector in READ-ONLY mode
      # (`--scan-file`, never rewrites). The PR title/body reach the script ONLY
      # as env values — never interpolated into this run body — injection-safe.
      - name: Reject AI/LLM self-attribution in commits + PR title/body
        if: inputs.run-no-attribution
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          module="tc_fitness.core_checks.no_llm_attribution"
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          rc=0

          # Read-only residue scan of ONE text artifact via the repo's installed
          # engine. Records failure but keeps going, so the log lists every
          # offending surface, not just the first.
          scan() {
            if ! uv run python -m "$module" --scan-file "$2"; then
              echo "::error::no-attribution: AI/LLM self-attribution residue in $1." >&2
              rc=1
            fi
          }

          # (a) every commit message in the PR range (base..head). When the range
          # cannot resolve (shallow checkout — set fetch-depth: 0 for full
          # coverage) or there is no PR context, fall back to HEAD's own message
          # so historical commits are never re-litigated and pushes never fail.
          shas=""
          if [[ -n "${PR_BASE_SHA:-}" && -n "${PR_HEAD_SHA:-}" ]]; then
            shas="$(git rev-list "${PR_BASE_SHA}..${PR_HEAD_SHA}" 2>/dev/null || true)"
          fi
          [[ -z "$shas" ]] && shas="$(git rev-list -1 HEAD)"
          while IFS= read -r sha; do
            [[ -z "$sha" ]] && continue
            git log -1 --format=%B "$sha" > "$workdir/commit-${sha}.txt"
            scan "commit ${sha} message" "$workdir/commit-${sha}.txt"
          done <<< "$shas"

          # (b) PR title and (c) PR body — env-bound, written verbatim so the
          # detector (not the shell) interprets their content.
          printf '%s' "$PR_TITLE" > "$workdir/pr-title.txt"
          scan "PR title" "$workdir/pr-title.txt"
          printf '%s' "$PR_BODY" > "$workdir/pr-body.txt"
          scan "PR body" "$workdir/pr-body.txt"

          if [[ "$rc" -ne 0 ]]; then
            echo "::error::no-attribution: remove the AI/LLM self-attribution" \
              "flagged above (decision D1). The same detector runs in the local" \
              "commit-msg strip hook — install it to catch this before push." >&2
          fi
          exit "$rc"

      # ── TS coverage half (opt-in) ───────────────────────────────────────
      - name: TypeScript coverage
        if: inputs.run-node
        shell: bash
        run: ${{ inputs.ts-coverage-command }}

      # ── Repo-specific post-orchestration (opt-in) ───────────────────────
      - name: Post-steps
        if: inputs.post-steps != ''
        shell: bash
        run: ${{ inputs.post-steps }}

      # ── Coverage-artifact handoff to sonar-scan.yml ─────────────────────
      # The engine wrote coverage XML at coverage-xml-path; upload it so the
      # downstream sonar-scan job imports it instead of re-running pytest
      # (the #499 artifact-handoff shape). always() so a gate failure that
      # still produced partial coverage doesn't strand the artifact.
      - name: Upload coverage artifact
        if: ${{ always() && inputs.upload-coverage-artifact }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.coverage-xml-path }}
          if-no-files-found: ignore
          retention-days: 1
