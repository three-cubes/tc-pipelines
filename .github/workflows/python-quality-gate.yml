---
name: python-quality-gate

# Reusable (workflow_call) Python quality gate for three-cubes repos.
#
# The gate's STEPS are owned by the fitness engine (three-cubes-fitness, the
# `tc-fitness` CLI), not by this workflow. The consuming repo declares its gate
# — dep-install, the exact pytest invocation (test dirs + --cov roots + markers
# + -n auto), ruff/bandit targets, detect-secrets baseline, and its
# check-catalogue module — in a repo-local `[tool.tc_fitness]` block (or
# `.tc-fitness.toml`). `uv run tc-fitness run` reads that config and runs the
# gate in order from one Python entrypoint. The SAME binary + SAME config is
# what `make check` runs locally, so local == CI by construction.
#
# This workflow therefore owns only the GitHub Actions ENVIRONMENT around that
# one command: provisioning a pinned/cached uv venv, the optional Node/TS half
# (a separate ecosystem the Python engine does not orchestrate), repo-specific
# pre/post orchestration hooks, and the coverage-artifact handoff to
# `sonar-scan.yml`. Repo-specific gate STEPS are config in the engine, never
# inputs here — that is the whole point of the convergence.
#
# ── Reusable-tag ↔ engine-tag compatibility ─────────────────────────────────
# A consumer pins BOTH this reusable (@vX.Y.Z) and three-cubes-fitness (in its
# pyproject). Optional inputs need a minimum engine; the composite fails with an
# actionable message if the pin is too old, so mismatches never surface as cryptic
# argparse errors. Minimums:
#   reusable >= v1.11.0        →  engine any        (base gate)
#   pytest-shards > 1          →  engine >= v0.9.0  (--shard)
#   tier set                   →  engine >= v0.10.0 (--tier + stage/depends_on parallelism)
#   enforce-new-code-coverage  →  engine >= v0.8.0  (new_code_coverage core check)
# The default (no shards, no tier) works on any engine >= v0.8.x.
#
# Part of three-cubes/kairix#499 Phase 4 (org CI consolidation).

on:
  workflow_call:
    inputs:
      # ── Toolchain pins (forwarded to setup-uv-cached) ───────────────────
      python-version:
        description: "Python version uv resolves against."
        type: string
        default: "3.12"
      uv-version:
        description: "Pinned uv version (org standard)."
        type: string
        default: "0.11.16"
      fetch-depth:
        description: "checkout fetch-depth. 0 = full history (secret scanning / new-code); 2 = HEAD~1 for changed-file diffs."
        type: number
        default: 2
      # ── Install surface (forwarded to setup-uv-cached) ──────────────────
      sync-args:
        description: >-
          Arguments to `uv sync`. Workspace repos use `--locked --all-packages`;
          single-package repos use e.g. `--all-extras --all-groups`. Must agree
          with the dep-install the engine config declares for local runs.
        type: string
        default: "--locked --all-packages"
      ci-requirements-path:
        description: >-
          `--require-hashes` requirements file for CI-only tools installed into
          the same .venv before the gate runs. Empty string skips the step.
        type: string
        default: ".github/requirements-ci.txt"
      # ── The gate ────────────────────────────────────────────────────────
      tc-fitness-args:
        description: >-
          Arguments to the engine CLI. Default `run` executes the full gate
          declared in the repo's `[tool.tc_fitness]` config. Override e.g.
          `run --changed-files-from .tc-fitness-changed-files`.
        type: string
        default: "run"
      write-changed-files:
        description: >-
          Write a newline-delimited repo-relative changed-file list before the
          gate. Pair with `tc-fitness-args: run --changed-files-from <path>` for
          the diff-scoped PR smoke tier.
        type: boolean
        default: false
      changed-files-path:
        description: >-
          Repo-relative file path written when `write-changed-files` is true.
          Must match the path passed to `tc-fitness run --changed-files-from`.
        type: string
        default: ".tc-fitness-changed-files"
      run-no-attribution:
        description: >-
          Reject AI/LLM self-attribution residue in the PR's commit messages and
          in the PR title + body (Autonomous Delivery Platform decision D1),
          symmetric with the meta gate's leg. Uses the repo's ALREADY-installed
          tc-fitness `no_llm_attribution` detector in READ-ONLY mode (`--scan-file`
          — never rewrites history); the file-residue + canonical-identity range
          checks stay owned by `tc-fitness run` via `[tool.tc_fitness]` config.
          Full commit-range coverage needs `fetch-depth: 0` (as the engine's
          range/secret-scan checks already do); otherwise only the tip commit +
          title/body are scanned.
        type: boolean
        default: true
      pre-steps:
        description: >-
          Optional bash run before `tc-fitness run`, for repo-specific
          orchestration that genuinely cannot be a config-declared check
          (e.g. a render smoke). Empty string skips.
        type: string
        default: ""
      post-steps:
        description: >-
          Optional bash run after `tc-fitness run` (always runs unless the gate
          step itself was skipped). Empty string skips.
        type: string
        default: ""
      # ── Coverage-artifact handoff to sonar-scan.yml ─────────────────────
      upload-coverage-artifact:
        description: "Upload the engine-produced coverage XML as an artifact for the downstream Sonar scan."
        type: boolean
        default: true
      coverage-xml-path:
        description: >-
          Path the engine writes coverage XML to (must match the repo's
          sonar-project.properties `sonar.python.coverage.reportPaths`).
        type: string
        default: "coverage.xml"
      coverage-artifact-name:
        description: "Artifact name the downstream sonar-scan job downloads."
        type: string
        default: "coverage-data"
      # ── Node / TS half (opt-in — a separate ecosystem) ──────────────────
      run-node:
        description: "Run the pnpm/TS half (install + TS coverage) alongside the Python gate."
        type: boolean
        default: false
      node-version-file:
        description: "Path to the Node version file (.nvmrc) when run-node is true."
        type: string
        default: ".nvmrc"
      pnpm-version:
        description: "pnpm version to install when run-node is true."
        type: string
        default: "10.27.0"
      pnpm-install-args:
        description: "Args for `pnpm install` when run-node is true."
        type: string
        default: "--frozen-lockfile --ignore-scripts"
      ts-coverage-command:
        description: "Command run for the TS coverage half when run-node is true."
        type: string
        default: "pnpm -r --if-present test:coverage"
      pytest-shards:
        description: >-
          Number of parallel shards to split the gate's pytest step across. Default
          1 = a single byte-identical `quality` job (the check name + behaviour are
          unchanged). >1 fans the gate into N matrix runners each invoking
          `tc-fitness run --shard i/N` (only steps declaring `shard_args` in the
          repo's `[tool.tc_fitness]` are split), then a `coverage-combine` job merges
          the shard `.coverage.<i>` files into the single XML the sonar handoff
          consumes. Requires the repo to declare `shard_args` on its pytest step and
          commit a `.test_durations` map (see tc-fitness `--shard`, ≥ v0.9.0).
        type: number
        default: 1
      tier:
        description: >-
          Pass `--tier <name>` to `tc-fitness run` (smoke/full/nightly) — runs only
          the `[tool.tc_fitness]` steps whose `tags` include the name. Empty (the
          default) runs the full gate. Needs three-cubes-fitness >= v0.10.0 (the
          in-gate concern-parallelism + `--tier` release).
        type: string
        default: ""
      coverage-combine-post:
        description: >-
          Repo-owned bash command run in the `coverage-combine` job AFTER the shard
          `.coverage.*` are merged to the combined XML, BEFORE the Sonar upload —
          for a consumer whose pytest uses many `--cov` roots to normalise the
          multi-source paths so Sonar resolves them (same trust model as
          pre-steps/post-steps: repo-owned config, never external input). Runs only
          when the combined XML exists; non-blocking. Only relevant when
          pytest-shards > 1.
        type: string
        default: ""
      code-change-filter:
        description: >-
          Extended-regex matched against each changed path to gate the pytest shard
          fan-out: on a docs/config-only PR (NO changed path matches) the N-way
          `quality-shard` matrix + `coverage-combine` are SKIPPED and a single
          `quality` catalogue lane runs the gate instead; on a code change the
          shards run as normal. Empty (the DEFAULT) DISABLES the gate — the shard
          matrix always runs, so behaviour is byte-identical for every consumer that
          sets no filter (backward-compatible). Pair with the engine's
          `--changed-files-from` diff-scoping (write-changed-files + tc-fitness-args)
          so the fallback lane also skips pytest itself. Example:
          `\.py$|^src/|^tests/|^pyproject\.toml$|^uv\.lock$`. Only relevant when
          pytest-shards > 1.
        type: string
        default: ""
      # ── New-code coverage floor (org-wide CI backstop) ──────────────────
      enforce-new-code-coverage:
        description: >-
          Enforce the changed-line coverage floor in CI — the org backstop for
          SonarCloud's "Coverage on New Code >= 80%". The engine's
          `new_code_coverage` core check soft-skips inside `tc-fitness run` (it
          precedes pytest, so no coverage XML exists yet), so this reusable
          re-runs it in a dedicated job AFTER the coverage XML is produced and
          uploaded. Config — floor_pct, roots, base_ref, coverage_report — is the
          consuming repo's `[tool.tc_fitness.core_checks.new_code_coverage]`
          block. Needs three-cubes-fitness >= v0.8.0 (the changed-line floor).
          Default false (backward-compatible); the org-standard caller sets true.
          Only meaningful with `upload-coverage-artifact: true`.
        type: boolean
        default: false
      new-code-base-ref:
        description: >-
          Trunk ref the new-code coverage floor diffs changed lines against. The
          job fetches this ref so `git merge-base <ref> HEAD` resolves in CI —
          without it the engine check soft-passes (no protection). Must match the
          repo's `[tool.tc_fitness.core_checks.new_code_coverage].base_ref`.
        type: string
        default: "origin/main"
    secrets:
      gh-token:
        description: "GITHUB_TOKEN override for steps that need authenticated git/gh (engine secret-scan changed-file diff). Falls back to github.token."
        required: false
      private-infra-patterns:
        description: "Optional consumer secret forwarded into the fitness gate's env as PRIVATE_INFRA_PATTERNS (e.g. kairix's F73 private-infra detector). Unset leaves it empty."
        required: false

permissions:
  contents: read

jobs:
  # Change-gate: decide whether the PR/push touched CODE (per code-change-filter)
  # so the pytest shard fan-out can be skipped on a docs/config-only change. With
  # an EMPTY filter (the default) this outputs `code-changed=true` with no git work,
  # so every downstream `if:` reduces to its pre-change form — byte-identical for
  # consumers that set no filter. Fails OPEN (true) on any indeterminate diff, so a
  # detection glitch costs a redundant run, never a skipped test.
  detect-changes:
    name: Detect code changes (change-gate)
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.detect.outputs.code-changed }}
    steps:
      - name: Decide code-changed
        id: detect
        # repin to an immutable SHA at release (SGO-280); branch ref bootstraps a
        # new internal action so the self-test resolves it on the branch.
        uses: three-cubes/tc-pipelines/actions/detect-code-changes@dan/sgo-280-reusable-ci-standard
        with:
          code-change-filter: ${{ inputs.code-change-filter }}
          fetch-depth: ${{ inputs.fetch-depth }}

  # Default (pytest-shards == 1): ONE byte-identical job. The name is preserved so
  # existing consumers' required-status-check context is unchanged; the sharded
  # jobs below are skipped and never required. Also the FALLBACK lane when sharding
  # is on but the change-gate found a docs/config-only change (code-changed=false):
  # one catalogue lane runs so the fan-in `gate` still has a passing quality lane.
  quality:
    name: Python quality gate
    needs: [detect-changes]
    if: ${{ inputs.pytest-shards <= 1 || needs.detect-changes.outputs.code-changed != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run the gate (unsharded)
        uses: three-cubes/tc-pipelines/actions/python-gate-body@d0145c781a3f26a434fa46d4933d791d7acda078 # SHA pin (SGO-266)
        with:
          python-version: ${{ inputs.python-version }}
          uv-version: ${{ inputs.uv-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements-path: ${{ inputs.ci-requirements-path }}
          fetch-depth: ${{ inputs.fetch-depth }}
          tc-fitness-args: ${{ inputs.tc-fitness-args }}
          write-changed-files: ${{ inputs.write-changed-files }}
          changed-files-path: ${{ inputs.changed-files-path }}
          run-no-attribution: ${{ inputs.run-no-attribution }}
          pre-steps: ${{ inputs.pre-steps }}
          post-steps: ${{ inputs.post-steps }}
          run-node: ${{ inputs.run-node }}
          node-version-file: ${{ inputs.node-version-file }}
          pnpm-version: ${{ inputs.pnpm-version }}
          pnpm-install-args: ${{ inputs.pnpm-install-args }}
          ts-coverage-command: ${{ inputs.ts-coverage-command }}
          gh-token: ${{ secrets.gh-token || github.token }}
          private-infra-patterns: ${{ secrets.private-infra-patterns }}
          upload-coverage-artifact: ${{ inputs.upload-coverage-artifact }}
          coverage-xml-path: ${{ inputs.coverage-xml-path }}
          coverage-artifact-name: ${{ inputs.coverage-artifact-name }}
          tier: ${{ inputs.tier }}
          shard-index:
          shard-total:

  # ── Sharded path (pytest-shards > 1 AND code changed) ───────────────────────
  # Build the [1..N] matrix (no range function in Actions expressions). Gated on
  # the change-gate: a docs/config-only change (code-changed=false) skips the whole
  # shard fan-out — the `quality` fallback lane above carries the gate instead. An
  # empty code-change-filter makes code-changed always true, so this is unchanged.
  shards:
    needs: [detect-changes]
    if: ${{ inputs.pytest-shards > 1 && needs.detect-changes.outputs.code-changed == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        env:
          N: ${{ inputs.pytest-shards }}
        run: |
          set -euo pipefail
          # [1,2,...,N] — seq builds the comma list; the brackets make it JSON.
          echo "matrix=[$(seq -s, 1 "$N")]" >> "$GITHUB_OUTPUT"

  # Each shard runs the whole gate with `tc-fitness run --shard i/N`; only steps
  # declaring `shard_args` split (pytest), so the non-pytest legs re-run per shard
  # (cheap relative to the pytest win) while pytest wall-clock drops ~1/N.
  quality-shard:
    needs: [shards, detect-changes]
    if: ${{ inputs.pytest-shards > 1 && needs.detect-changes.outputs.code-changed == 'true' }}
    name: Python quality gate (shard ${{ matrix.shard }}/${{ inputs.pytest-shards }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.shards.outputs.matrix) }}
    steps:
      - name: Run the gate (shard ${{ matrix.shard }}/${{ inputs.pytest-shards }})
        uses: three-cubes/tc-pipelines/actions/python-gate-body@d0145c781a3f26a434fa46d4933d791d7acda078 # SHA pin (SGO-266)
        with:
          python-version: ${{ inputs.python-version }}
          uv-version: ${{ inputs.uv-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements-path: ${{ inputs.ci-requirements-path }}
          fetch-depth: ${{ inputs.fetch-depth }}
          tc-fitness-args: ${{ inputs.tc-fitness-args }}
          write-changed-files: ${{ inputs.write-changed-files }}
          changed-files-path: ${{ inputs.changed-files-path }}
          run-no-attribution: ${{ inputs.run-no-attribution }}
          pre-steps: ${{ inputs.pre-steps }}
          post-steps: ${{ inputs.post-steps }}
          run-node: ${{ inputs.run-node }}
          node-version-file: ${{ inputs.node-version-file }}
          pnpm-version: ${{ inputs.pnpm-version }}
          pnpm-install-args: ${{ inputs.pnpm-install-args }}
          ts-coverage-command: ${{ inputs.ts-coverage-command }}
          gh-token: ${{ secrets.gh-token || github.token }}
          private-infra-patterns: ${{ secrets.private-infra-patterns }}
          upload-coverage-artifact: ${{ inputs.upload-coverage-artifact }}
          coverage-xml-path: ${{ inputs.coverage-xml-path }}
          coverage-artifact-name: ${{ inputs.coverage-artifact-name }}
          tier: ${{ inputs.tier }}
          shard-index: ${{ matrix.shard }}
          shard-total: ${{ inputs.pytest-shards }}

  # Merge the shard `.coverage.<i>` files → the single coverage XML the sonar
  # handoff consumes. always() so a shard FAIL that still produced partial
  # coverage does not strand the report.
  coverage-combine:
    needs: [quality-shard, detect-changes]
    if: ${{ always() && inputs.pytest-shards > 1 && inputs.upload-coverage-artifact && needs.detect-changes.outputs.code-changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Locked uv install
        uses: three-cubes/tc-pipelines/actions/setup-uv-cached@v1
        with:
          uv-version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.python-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements: ${{ inputs.ci-requirements-path }}
      - name: Download shard coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: ${{ inputs.coverage-artifact-name }}-shard-*
          merge-multiple: true
      - name: Combine shard coverage → XML
        shell: bash
        env:
          COVERAGE_XML: ${{ inputs.coverage-xml-path }}
        run: |
          # NOT `set -e`: `coverage combine` exits non-zero when it SKIPS an
          # empty/partial shard file (e.g. a shard whose tests were all filtered),
          # but the files it DID combine are still valid. Tolerate that and gate on
          # whether a combined `.coverage` was actually produced.
          set -uo pipefail
          shopt -s nullglob
          shards=(.coverage.*)
          if [[ ${#shards[@]} -eq 0 ]]; then
            echo "::warning::no shard coverage data found; skipping combine."
            exit 0
          fi
          echo "combining ${#shards[@]} shard file(s): ${shards[*]}"
          uv run coverage combine "${shards[@]}" || echo "::warning::coverage combine skipped an empty/partial shard file (kept the rest)."
          if [[ -f .coverage ]]; then
            uv run coverage xml -o "$COVERAGE_XML" || echo "::warning::coverage xml produced no report (empty/unreportable shard data)."
          else
            echo "::warning::no combined coverage data produced; no XML written."
          fi
          # Coverage assembly is a non-blocking convenience for the Sonar handoff
          # (matching the original always()/if-no-files-found: ignore upload). The
          # gate's real verdict is the shard test results, which already gated in
          # the quality-shard jobs — a reporting hiccup here must not fail the gate.
          exit 0
      # Post-combine hook: repo-specific transform of the combined coverage XML
      # BEFORE the Sonar handoff — e.g. a consumer whose pytest uses many `--cov`
      # roots (ambiguous multi-source paths) collapses them to repo-root here so
      # Sonar resolves them. Runs only when the combined XML exists; non-blocking.
      - name: Coverage combine post-hook
        if: ${{ inputs.coverage-combine-post != '' }}
        shell: bash
        env:
          COVERAGE_XML: ${{ inputs.coverage-xml-path }}
        run: |
          set -uo pipefail
          if [[ -f "$COVERAGE_XML" ]]; then
            ${{ inputs.coverage-combine-post }}
          else
            echo "::warning::no combined coverage XML; skipping coverage-combine-post."
          fi
      - name: Upload combined coverage XML
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.coverage-xml-path }}
          if-no-files-found: ignore

  # ── New-code coverage floor (org-wide CI backstop) ──────────────────────────
  # Re-run the engine's new_code_coverage core check AFTER the coverage XML is
  # produced. Inside `tc-fitness run` the check soft-skips (it is ordered before
  # pytest, so no report exists yet) and the sharded path only ever has partial
  # per-shard coverage — so the changed-line floor was, until now, enforced only
  # in the local make check / pre-push loop. This job downloads the SAME combined
  # coverage artifact the Sonar handoff uses, restores the trunk ref so the diff
  # resolves (the check soft-PASSES if `git merge-base <base> HEAD` fails — i.e.
  # no protection — so the fetch is load-bearing), and runs the HARD floor. Opt-in
  # via enforce-new-code-coverage; the org-standard caller sets it true.
  new-code-coverage:
    name: New-code coverage floor
    needs: [quality, quality-shard, coverage-combine, detect-changes]
    if: >-
      ${{ always() && inputs.enforce-new-code-coverage && inputs.upload-coverage-artifact
          && needs.detect-changes.outputs.code-changed == 'true'
          && (needs.quality.result == 'success' || needs.quality-shard.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the changed-line diff)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Restore the trunk ref (else the floor soft-passes)
        shell: bash
        env:
          BASE_REF: ${{ inputs.new-code-base-ref }}
        run: |
          set -euo pipefail
          # Fetch the base branch as origin/<branch> so the engine's
          # `git merge-base <base_ref> HEAD` resolves. Without it the check
          # returns an empty changed-line set and soft-PASSES — silently
          # providing no protection. Strip a leading `origin/` for the fetch
          # refspec; ignore a fetch failure so a detached/renamed trunk does not
          # hard-error (the check then soft-passes, matching pre-change behaviour).
          base="${BASE_REF#origin/}"
          git fetch --no-tags origin "+refs/heads/${base}:refs/remotes/origin/${base}" || \
            echo "::warning::could not fetch ${BASE_REF}; the new-code floor may soft-pass."
      - name: Locked uv install
        uses: three-cubes/tc-pipelines/actions/setup-uv-cached@v1
        with:
          uv-version: ${{ inputs.uv-version }}
          python-version: ${{ inputs.python-version }}
          sync-args: ${{ inputs.sync-args }}
          ci-requirements: ${{ inputs.ci-requirements-path }}
      - name: Download the combined coverage XML
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.coverage-artifact-name }}
      - name: Enforce the new-code coverage floor
        shell: bash
        env:
          COVERAGE_XML: ${{ inputs.coverage-xml-path }}
        run: |
          set -euo pipefail
          if [[ ! -f "$COVERAGE_XML" ]]; then
            echo "::error::new-code coverage floor cannot run — no coverage XML ($COVERAGE_XML) was produced/uploaded; check upload-coverage-artifact + the gate's pytest --cov config."
            exit 1
          fi
          # Reads [tool.tc_fitness.core_checks.new_code_coverage] from the repo:
          # floor_pct / roots / base_ref / coverage_report. Exit 1 on a below-floor
          # changed file (hard, non-grandfatherable), 0 when the changed lines clear
          # the floor or there is no measurable new code.
          uv run python -m tc_fitness.core_checks.new_code_coverage

  # ── The single required-status context (shard-count-independent) ────────────
  # The `quality` job runs only unsharded and `quality-shard` only sharded, so
  # neither name is stable to pin in branch protection: pinning `quality` lets a
  # FAILED shard merge (that job is SKIPPED when sharding is on — a skipped
  # required check passes); pinning the shard cells bakes the shard COUNT into
  # branch protection. This fan-in always runs, needs both lanes, and fails if any
  # lane failed OR neither quality lane ran — so it is the ONE context a consumer
  # pins regardless of pytest-shards. Its name never changes with the shard count.
  gate:
    name: Python quality gate result
    needs: [quality, quality-shard, coverage-combine, new-code-coverage]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate the quality lanes
        env:
          R_QUALITY: ${{ needs.quality.result }}
          R_SHARD: ${{ needs.quality-shard.result }}
          R_COMBINE: ${{ needs.coverage-combine.result }}
          R_NEWCOV: ${{ needs.new-code-coverage.result }}
        run: |
          set -euo pipefail
          echo "quality=$R_QUALITY quality-shard=$R_SHARD coverage-combine=$R_COMBINE new-code-coverage=$R_NEWCOV"
          for r in "$R_QUALITY" "$R_SHARD" "$R_COMBINE" "$R_NEWCOV"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Python quality gate FAILED — a quality lane did not pass ($r)."
              exit 1
            fi
          done
          # Exactly one of the two quality lanes runs (the other is skipped by the
          # pytest-shards condition); if BOTH skipped, the gate never actually ran.
          if [[ "$R_QUALITY" == "skipped" && "$R_SHARD" == "skipped" ]]; then
            echo "::error::Python quality gate did not run — neither the unsharded nor the sharded lane executed."
            exit 1
          fi
          echo "Python quality gate: PASS."
