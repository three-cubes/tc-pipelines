name: meta-quality-gate

# Reusable (workflow_call) self-CI gate for FRAMEWORK / NON-PYTHON three-cubes
# repos — the second of the two org GHA shapes.
#
#   * Python repos run the full fitness catalogue via `python-quality-gate.yml`
#     (checkout → setup-uv-cached → `uv run tc-fitness run`).
#   * Repos with no Python package to gate (this tc-pipelines repo itself, docs
#     repos, action/workflow collections) instead run THIS meta gate: the
#     hygiene checks that apply to any repo — actionlint over the workflows,
#     yamllint over the YAML, a top-level LICENSE assertion, and branch naming.
#
# Every leg is independently toggleable so a consumer runs only what applies.
# All caller-supplied inputs are env-bound before reaching a shell body
# (never interpolated into a `run:` string) so a value can't break out of its
# string context — injection-safe per the org workflow standard.
#
# Part of three-cubes/kairix#499 (org CI consolidation).

on:
  workflow_call:
    inputs:
      run-actionlint:
        description: "Run actionlint over .github/workflows + actions."
        type: boolean
        default: true
      run-yamllint:
        description: "Run yamllint over the YAML scan paths."
        type: boolean
        default: true
      run-license:
        description: "Assert a top-level LICENSE file declaring the expected SPDX id."
        type: boolean
        default: true
      run-branch-naming:
        description: "Assert the head branch matches the org branch-naming shape."
        type: boolean
        default: true
      run-no-attribution:
        description: >-
          Reject AI/LLM self-attribution residue in the PR's commit messages and
          in the PR title + body (Autonomous Delivery Platform decision D1). Uses
          the shared tc-fitness no_llm_attribution detector in READ-ONLY mode — CI
          never rewrites history.
        type: boolean
        default: true
      yamllint-paths:
        description: >-
          Space-separated paths yamllint scans. Default covers the workflow +
          action YAML this repo ships.
        type: string
        default: ".github/workflows actions"
      yamllint-config:
        description: >-
          Inline yamllint config (the `-d` argument). Default reuses the org's
          relaxed base: line-length off (workflow descriptions run long) and
          document-start off (Actions YAML omits the `---`).
        type: string
        default: "{extends: relaxed, rules: {line-length: disable, document-start: disable}}"
      license-file:
        description: "Path to the license file the license leg asserts."
        type: string
        default: "LICENSE"
      spdx-id:
        description: "Expected SPDX license identifier (e.g. Apache-2.0, MIT)."
        type: string
        default: "Apache-2.0"
      branch-name-pattern:
        description: >-
          Anchored ERE the head branch must match (egrep). The default accepts
          the org `<user>/<slug>` shape (a Linear `<user>/<team>-<n>-<slug>`
          branch is a strict superset, so it matches too). Exempt branches
          (`main`, `develop`, automation) are skipped before the match.
        type: string
        default: "^[a-z][a-z0-9-]*/[a-z0-9][a-z0-9_/-]*$"
      no-attribution-fitness-ref:
        description: >-
          tc-fitness git ref the no-attribution leg resolves the shared
          no_llm_attribution detector from (must ship the `--scan-file`
          read-only seam, i.e. >= v0.7.1). Pin per repo to the engine the
          local commit-msg hook + fitness gate use, so the three surfaces
          share one pattern set and can never drift.
        type: string
        default: "v0.7.1"

permissions:
  contents: read

jobs:
  actionlint:
    if: inputs.run-actionlint
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install + run actionlint
        shell: bash
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  yamllint:
    if: inputs.run-yamllint
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: yamllint
        shell: bash
        # Config + scan paths are env-bound, never interpolated into the body.
        env:
          YAMLLINT_CONFIG: ${{ inputs.yamllint-config }}
          YAMLLINT_PATHS: ${{ inputs.yamllint-paths }}
        run: |
          set -euo pipefail
          pipx install yamllint
          # shellcheck disable=SC2086
          # rationale: YAMLLINT_PATHS is a deliberate space-separated path list
          # (a caller input), so word-splitting it into argv is intended.
          yamllint -d "$YAMLLINT_CONFIG" $YAMLLINT_PATHS

  license:
    if: inputs.run-license
    name: license
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Assert LICENSE present
        shell: bash
        # Inlined (not the license-present composite) so the gate has NO
        # dependency on an action ref that only resolves post-merge — this works
        # for the tc-pipelines self-CI bootstrap AND for foreign consumers of
        # meta-quality-gate@v1. The file path + SPDX id are env-bound (never
        # interpolated into the body) — injection-safe per the org standard.
        env:
          LICENSE_FILE: ${{ inputs.license-file }}
          SPDX_ID: ${{ inputs.spdx-id }}
        run: |
          set -euo pipefail
          if [[ ! -f "$LICENSE_FILE" ]]; then
            echo "::error::license: '$LICENSE_FILE' missing." \
              "fix: add a top-level $LICENSE_FILE declaring $SPDX_ID." >&2
            exit 1
          fi
          # An explicit SPDX-License-Identifier line is authoritative if present.
          if grep -qiF "SPDX-License-Identifier: ${SPDX_ID}" "$LICENSE_FILE"; then
            echo "license: '$LICENSE_FILE' declares $SPDX_ID (SPDX line)."; exit 0
          fi
          # Otherwise both body markers for the recognised id must appear
          # (name + version/clause) so a near-miss license can't false-pass.
          marker_a=""; marker_b=""
          case "$SPDX_ID" in
            Apache-2.0)    marker_a="Apache License";         marker_b="Version 2.0" ;;
            MIT)           marker_a="MIT License";            marker_b="Permission is hereby granted" ;;
            BSD-3-Clause)  marker_a="Redistribution and use"; marker_b="Neither the name" ;;
            BSD-2-Clause)  marker_a="Redistribution and use"; marker_b="THIS SOFTWARE IS PROVIDED" ;;
            GPL-3.0-only|GPL-3.0-or-later) marker_a="GNU GENERAL PUBLIC LICENSE"; marker_b="Version 3" ;;
            MPL-2.0)       marker_a="Mozilla Public License"; marker_b="Version 2.0" ;;
            *) echo "::error::license: SPDX id '$SPDX_ID' not recognised." \
                 "fix: add an 'SPDX-License-Identifier: $SPDX_ID' line to '$LICENSE_FILE'." >&2; exit 1 ;;
          esac
          if grep -qF "$marker_a" "$LICENSE_FILE" && grep -qF "$marker_b" "$LICENSE_FILE"; then
            echo "license: '$LICENSE_FILE' matches $SPDX_ID (body markers)."; exit 0
          fi
          echo "::error::license: '$LICENSE_FILE' is not $SPDX_ID" \
            "(expected '$marker_a' + '$marker_b', or an" \
            "'SPDX-License-Identifier: $SPDX_ID' line)." >&2
          exit 1

  branch-naming:
    if: inputs.run-branch-naming
    name: branch-naming
    runs-on: ubuntu-latest
    steps:
      - name: Assert branch name matches the org shape
        shell: bash
        # The branch name + pattern are env-bound; the head-ref is read from the
        # github context (never trusted into the body unquoted).
        env:
          # On pull_request the head ref is github.head_ref; on push it's the
          # ref_name. Either way it reaches the script only as an env value.
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          BRANCH_PATTERN: ${{ inputs.branch-name-pattern }}
        run: |
          set -euo pipefail

          # Exempt the trunk + automation branches (they never match the
          # feature-branch shape and must not fail the gate).
          case "$BRANCH_NAME" in
            main|develop|HEAD|gh-pages) \
              echo "branch-naming: '$BRANCH_NAME' is exempt."; exit 0 ;;
            worktree-agent-*|renovate/*|dependabot/*) \
              echo "branch-naming: '$BRANCH_NAME' is an exempt automation branch."; exit 0 ;;
          esac

          if [[ -z "$BRANCH_NAME" ]]; then
            echo "branch-naming: no head branch in context — skipping." ; exit 0
          fi

          if echo "$BRANCH_NAME" | grep -Eq "$BRANCH_PATTERN"; then
            echo "branch-naming: '$BRANCH_NAME' matches the org shape."
            exit 0
          fi

          echo "::error::branch-naming: '$BRANCH_NAME' does not match" \
            "'$BRANCH_PATTERN'. fix: rename to the org '<user>/<slug>' shape" \
            "(e.g. dan/meta-quality-gate): git branch -m <new-name>." >&2
          exit 1

  no-attribution:
    if: inputs.run-no-attribution
    # Stable required-status-check context (governance/rulesets/main.json gates on
    # it; see governance/STANDARDS.md §4). Do NOT rename without updating both.
    name: no-attribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so the PR commit range (base..head) resolves — the leg
          # scans EVERY commit message in that range, not just the tip.
          fetch-depth: 0
      - name: Install uv
        # The no-attribution scan resolves the tc-fitness detector via `uvx`;
        # ubuntu-latest ships no uv, so install it here (else `uvx: command not
        # found` is misread by the scan as a positive detection and fails every PR).
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Reject AI/LLM self-attribution in commits + PR title/body
        shell: bash
        # ONE detector: the tc-fitness `no_llm_attribution` scan the local
        # commit-msg strip hook (SGO-159) and the file-catalogue fitness rule also
        # share, so the local hook, this CI leg, and the gate can never drift.
        # `--scan-file` is READ-ONLY (CI must never rewrite history). The PR
        # title/body + the engine ref reach the script ONLY as env values — never
        # interpolated into this run body — injection-safe per the org standard
        # (see the LICENSE / branch-naming legs above).
        env:
          TC_FITNESS_REF: ${{ inputs.no-attribution-fitness-ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          module="tc_fitness.core_checks.no_llm_attribution"
          from="git+https://github.com/three-cubes/tc-fitness@${TC_FITNESS_REF}"
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          rc=0

          # Read-only residue scan of ONE text artifact. Never rewrites (no
          # --strip-file). Records failure in $rc but keeps going, so the log
          # lists every offending surface, not just the first.
          scan() {
            if ! uvx --from "$from" python -m "$module" --scan-file "$2"; then
              echo "::error::no-attribution: AI/LLM self-attribution residue in $1." >&2
              rc=1
            fi
          }

          # Advisory variant: warns on a hit but does NOT fail the gate. Used for
          # the PR BODY only, which legitimately QUOTES the banned patterns when a
          # PR documents the no-attribution policy itself (a text scan can't tell
          # documentation from real attribution). The DURABLE artifacts — every
          # commit message, the PR title, and the code (via the fitness rule) —
          # stay blocking below, so clean git history is still enforced.
          scan_advisory() {
            if ! uvx --from "$from" python -m "$module" --scan-file "$2"; then
              echo "::warning::no-attribution: possible AI/LLM self-attribution in $1 (advisory, not blocking — confirm it is documentation, not real residue)." >&2
            fi
          }

          # (a) every commit message in the PR range (base..head). Fall back to
          # HEAD's own message when there is no PR context (e.g. a push caller),
          # so the reusable never hard-fails outside a pull_request.
          if [[ -n "${PR_BASE_SHA:-}" && -n "${PR_HEAD_SHA:-}" ]]; then
            shas="$(git rev-list "${PR_BASE_SHA}..${PR_HEAD_SHA}")"
          else
            shas="$(git rev-list -1 HEAD)"
          fi
          while IFS= read -r sha; do
            [[ -z "$sha" ]] && continue
            git log -1 --format=%B "$sha" > "$workdir/commit-${sha}.txt"
            scan "commit ${sha} message" "$workdir/commit-${sha}.txt"
          done <<< "$shas"

          # (b) PR title and (c) PR body — env-bound, written verbatim so the
          # detector (not the shell) interprets their content. Empty on a push
          # caller, which scans clean.
          printf '%s' "$PR_TITLE" > "$workdir/pr-title.txt"
          scan "PR title" "$workdir/pr-title.txt"
          printf '%s' "$PR_BODY" > "$workdir/pr-body.txt"
          scan_advisory "PR body" "$workdir/pr-body.txt"

          if [[ "$rc" -ne 0 ]]; then
            echo "::error::no-attribution: remove the AI/LLM self-attribution" \
              "flagged above. Agent work is authored by the canonical bot/human," \
              "never advertised as model-generated (decision D1). The same" \
              "detector runs in the local commit-msg strip hook — install it to" \
              "catch this before push." >&2
          fi
          exit "$rc"
