name: example — event-dispatch (reusable self-check)

# Static call-graph self-check for the `event-dispatch.yml` reusable — the
# failure-driven OPEN side of the autonomous-delivery loop (SP-C-2). Every job
# here `uses:` it via its LOCAL path with a real consumer's input shape, so
# actionlint + GitHub's reusable-workflow resolver validate input names,
# required-input presence, types, and secret shapes against the reusable's
# `workflow_call:` contract at parse time — a mismatch fails HERE, not in a
# consumer's pipeline.
#
# The shapes exercise the full workflow_call contract statically across BOTH
# key-provisioning paths and BOTH event kinds (ci-failure + review-comment). The
# fallback secret is a clearly-dummy literal (the run-for-real gate keeps it from
# ever authenticating).
#
# De-serialised layout (parallel-dev friction fix): each reusable owns its OWN
# `example-<reusable>.yml`; `example-callers.yml` is a thin dispatcher that fans
# out to every file here — see its header for the "add your file" convention.
#
# NEVER runs the underlying work by default: `workflow_call` only and every job is
# gated on `run-for-real` (default false); the call graph is validated statically
# regardless of the gate, the bodies never execute under the default dispatch.
#
# Part of three-cubes/kairix#499 Phase 4 (org CI consolidation).

on:
  workflow_call:
    inputs:
      run-for-real:
        description: >-
          Leave false (default) for the static call-graph self-check — every job
          stays gated off and only the input/secret SHAPES are validated. The
          dispatcher (example-callers.yml) passes this through; flipping it true
          would attempt a real dispatch and is not the point here.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  event-dispatch-kairix-kv:
    if: ${{ inputs.run-for-real }}
    uses: ./.github/workflows/event-dispatch.yml
    permissions:
      contents: read
      pull-requests: read
      id-token: write # federate to Azure for the secret-free Key Vault fetch
    with:
      # kairix-shaped, secret-free (RECOMMENDED), CI-failure: a `workflow_run`
      # trigger forwards the failing run's head branch + name + log url. NO
      # `secrets:` block — the Linear key is fetched from Key Vault via WIF at
      # run time; linear-key-secret-name defaults to `ci-verify-and-close`.
      event-kind: ci-failure
      branch-name: dan/pla-310-example-slug
      failing-check: python-quality-gate
      failure-log-url: https://github.com/three-cubes/kairix/actions/runs/1
      linear-key-vault: ${{ vars.KAIRIX_KV_NAME }}
      azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  event-dispatch-kairix-review:
    if: ${{ inputs.run-for-real }}
    uses: ./.github/workflows/event-dispatch.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      # kairix-shaped, fallback secret path, REVIEW-COMMENT: an `issue_comment`
      # trigger forwards only the PR number (the branch is read from the PR) +
      # the comment body/author/url (env-bound, injection-safe).
      event-kind: review-comment
      pr-number: "42"
      comment-author: some-reviewer
      comment-url: https://github.com/three-cubes/kairix/pull/42#issuecomment-1
      comment-body: please guard the empty-list branch before indexing
    secrets:
      LINEAR_API_KEY: dummy-not-a-real-key-shape-check-only

  event-dispatch-taz:
    if: ${{ inputs.run-for-real }}
    uses: ./.github/workflows/event-dispatch.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      # taz-shaped, fallback secret path, CI-failure with an explicit issue-id
      # override + a first-actionable `fix:` line and its own redispatch label.
      event-kind: ci-failure
      issue-id: SGO-169
      failing-check: mutation-gate
      failure-summary: "survivor at adapter.py:88 — add a boundary test"
      needs-redispatch-label: redispatch
    secrets:
      LINEAR_API_KEY: dummy-not-a-real-key-shape-check-only
