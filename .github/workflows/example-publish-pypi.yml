name: example — publish-pypi (reusable self-check)

# Static call-graph self-check for the `publish-pypi.yml` reusable. Every job here
# `uses:` it via its LOCAL path with a real consumer's input shape, so actionlint
# + GitHub's reusable-workflow resolver validate input names, required-input
# presence, types, and secret shapes against the reusable's `workflow_call:`
# contract at parse time — a mismatch fails HERE, not in a consumer's pipeline.
#
# HITL publish path — stays gated off: publishes to PyPI via Trusted Publishing
# (OIDC, no stored token). The real publish touches the release path and needs a
# registered trusted publisher + the target GitHub environment, so it MUST stay
# gated off in this self-check. No secret is wired: Trusted Publishing is
# secret-free by construction; the caller job grants `id-token: write` (widening
# the file's default `contents: read`) so the OIDC exchange shape is what a real
# consumer wires.
#
# De-serialised layout (parallel-dev friction fix): each reusable owns its OWN
# `example-<reusable>.yml`; `example-callers.yml` is a thin dispatcher that fans
# out to every file here — see its header for the "add your file" convention.
#
# NEVER runs the underlying work by default: `workflow_call` only and every job is
# gated on `run-for-real` (default false); the call graph is validated statically
# regardless of the gate, the bodies never execute under the default dispatch.
#
# Part of three-cubes/kairix#499 Phase 4 (org CI consolidation).

on:
  workflow_call:
    inputs:
      run-for-real:
        description: >-
          Leave false (default) for the static call-graph self-check — every job
          stays gated off and only the input/secret SHAPES are validated. The
          dispatcher (example-callers.yml) passes this through; flipping it true
          would attempt a real publish and needs a registered trusted publisher
          + the target environment — this self-check is not the place for that.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish-pypi-kairix:
    if: ${{ inputs.run-for-real }}
    uses: ./.github/workflows/publish-pypi.yml
    permissions:
      contents: read
      id-token: write
    with:
      # kairix-shaped: long PyPI dist name, short import + console name, the
      # release/release-alpha environment pair, an explicit tag ref.
      dist-name: kairix-agentic-knowledge-mgt
      import-name: kairix
      console-script: kairix
      stable-environment: release
      alpha-environment: release-alpha
      is-alpha: false
      ref: v2026.5.10.6
      python-version: "3.12"

  publish-pypi-fitness:
    if: ${{ inputs.run-for-real }}
    uses: ./.github/workflows/publish-pypi.yml
    permissions:
      contents: read
      id-token: write
    with:
      # tc-fitness-shaped (candidate second consumer): dist-name `tc-fitness`
      # imports as `tc_fitness`, a dispatch-driven alpha route, and the
      # stable/alpha environment + python-version left on kairix-shaped defaults.
      dist-name: tc-fitness
      import-name: tc_fitness
      console-script: tc-fitness
      is-alpha: true
      ref: v0.8.0
