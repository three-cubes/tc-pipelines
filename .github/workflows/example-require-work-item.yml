name: example — require-work-item (reusable self-check)

# Static call-graph self-check for the `require-work-item.yml` reusable — the
# merge-side twin of verify-and-close (SP-C-5, fail-closed "no work without a
# work item"). Every job here `uses:` it via its LOCAL path with a real
# consumer's input shape, so actionlint + GitHub's reusable-workflow resolver
# validate input names, required-input presence, types, and secret shapes against
# the reusable's `workflow_call:` contract at parse time — a mismatch fails HERE,
# not in a consumer's pipeline.
#
# The shapes exercise the full workflow_call contract statically across BOTH
# key-provisioning paths: the secret-free Key Vault (WIF) path (kairix-kv,
# RECOMMENDED) and the fallback LINEAR_API_KEY secret path (taz). A real consumer
# triggers this on `pull_request`; here the run-for-real gate keeps it static-only
# (no live PR), and the fallback secret is a clearly-dummy literal so the call
# shape resolves without a real credential.
#
# De-serialised layout (parallel-dev friction fix): each reusable owns its OWN
# `example-<reusable>.yml`; `example-callers.yml` is a thin dispatcher that fans
# out to every file here — see its header for the "add your file" convention.
#
# NEVER runs the underlying work by default: `workflow_call` only and every job is
# gated on `run-for-real` (default false); the call graph is validated statically
# regardless of the gate, the bodies never execute under the default dispatch.
#
# Part of three-cubes/kairix#499 Phase 4 (org CI consolidation).

on:
  workflow_call:
    inputs:
      run-for-real:
        description: >-
          Leave false (default) for the static call-graph self-check — every job
          stays gated off and only the input/secret SHAPES are validated. The
          dispatcher (example-callers.yml) passes this through; flipping it true
          would attempt a real check (needs a live PR) and is not the point here.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  require-work-item-kairix-kv:
    if: ${{ inputs.run-for-real }}
    uses: ./.github/workflows/require-work-item.yml
    permissions:
      contents: read
      pull-requests: read
      id-token: write # federate to Azure for the secret-free Key Vault fetch
    with:
      # kairix-shaped, secret-free (RECOMMENDED): fetch the Linear key from Key
      # Vault via WIF at run time — NO `secrets:` block. Default open-state set
      # + OWNER/MEMBER maintainer bypass + the default no-work-item escape hatch.
      linear-key-vault: ${{ vars.KAIRIX_KV_NAME }}
      azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  require-work-item-taz:
    if: ${{ inputs.run-for-real }}
    uses: ./.github/workflows/require-work-item.yml
    permissions:
      contents: read
      pull-requests: read
    with:
      # taz-shaped, fallback secret path: require an already-started item (drop
      # backlog/triage), trust repo collaborators as maintainers too, and let the
      # label + rationale bypass without a code-owner approval (escape-requires-
      # approval off).
      allowed-state-types: "unstarted started"
      maintainer-associations: "OWNER MEMBER COLLABORATOR"
      no-work-item-label: hotfix-no-work-item
      escape-requires-approval: false
    secrets:
      LINEAR_API_KEY: dummy-not-a-real-key-shape-check-only
