# Dependabot — tc-pipelines self-wire (SGO-189 / SGO-82).
#
# Instantiated from the Golden Path baseline (governance/dependabot.yml) per
# ADR DEP-D1. This CORE control-plane repo previously shipped only the TEMPLATE
# and never ran it on itself — so its own third-party pins went un-bumped.
#
# Policy: a 3-day cooldown across ALL updates (security, patch, minor, major).
# The supply-chain attack surface (worms injected into popular packages, then
# patch-released as silent "security fixes") is the dominant risk; the 3-day
# window lets the community surface compromise before we pull, applied
# uniformly so the operator never has to remember which tier an update sits in.
#
# Keep the repo-level `dependabot_security_updates` toggle OFF so security-
# advisory PRs also respect this cooldown (alerts still surface independently;
# a CISA-KEV known-exploited CVE is the operator's signal to override manually).
#
# TARGETING (SGO-82 root cause): every listed directory MUST contain a
# parseable manifest on disk, or it silently produces zero PRs. So:
#   * NO npm ecosystem — this repo ships no JS/TS (no package.json anywhere).
#   * pip points at /tools, where the only pyproject.toml lives (NOT the root).
#   * github-actions `directory: "/"` scans ONLY .github/workflows + a root
#     action.yml, which would MISS every composite action. The third-party SHA
#     pins (astral-sh/setup-uv, pre-commit/action, azure/login,
#     actions/create-github-app-token) live inside actions/* and
#     .github/actions/*, so those are covered explicitly via a `directories`
#     glob — the "add the real workspace" half of the targeting fix.
# Reference:
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2

updates:
  # ----- pip / python (manifest: tools/pyproject.toml) -----
  - package-ecosystem: "pip"
    directory: "/tools"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 3
    groups:
      python-deps:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]
    commit-message:
      prefix: "deps"
      include: "scope"

  # ----- github actions (workflows + every composite action) -----
  # directories (plural) supports the `*` glob; each match resolves to a real
  # action.yml on disk. Limit raised vs the single-directory template so a
  # simultaneous grouped PR per directory is never suppressed.
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/actions/*"
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-patch-days: 3
      semver-minor-days: 3
      semver-major-days: 3
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      include: "scope"
