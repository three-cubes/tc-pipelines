name: 'Smoke check systemctl units on Azure VM'
description: |
  Post-deploy sanity check — runs `systemctl is-active` against a list of
  units on the target VM via `az vm run-command invoke`. Fails if any unit
  is not `active`.

  Usage:
    - uses: three-cubes/tc-pipelines/.github/actions/smoke-systemctl@v1
      with:
        resource-group: RG-AGENTS-CORE
        vm-name: vm-openclaw
        units: 'openclaw-gateway cli-proxy-api otel-collector caddy'

inputs:
  resource-group:
    description: Azure resource group containing the VM.
    required: true
  vm-name:
    description: Target VM name.
    required: true
  units:
    description: Space-separated list of systemd unit names to check.
    required: true

runs:
  using: composite
  steps:
    - name: systemctl is-active rollup
      shell: bash
      env:
        RG: ${{ inputs.resource-group }}
        VM: ${{ inputs.vm-name }}
        UNITS: ${{ inputs.units }}
      run: |
        set -euo pipefail
        MSG=$(az vm run-command invoke \
          --resource-group "$RG" \
          --name "$VM" \
          --command-id RunShellScript \
          --scripts "systemctl is-active ${UNITS} 2>&1 | tr '\n' ' '; echo" \
          --query 'value[0].message' -o tsv)
        echo "${VM}: ${MSG}"
        # az run-command's `message` field includes its own "Enable succeeded:"
        # preamble + stdout/stderr block markers around the actual script
        # output. Don't require EVERY line to match — instead, ensure each
        # requested unit appears at least once as "active" AND no failure
        # markers anywhere in the message.
        EXPECTED=$(echo "${UNITS}" | wc -w)
        # Split into one-word-per-line then count exact matches — grep -oE
        # with a delimiter-aware pattern undercounts because consecutive
        # matches share the space (e.g. "active active active" → 2 matches).
        ACTIVE=$(echo "$MSG" | tr -s '[:space:]' '\n' | grep -cx 'active')
        if echo "$MSG" | grep -qE '\b(inactive|failed|activating|deactivating|unknown)\b'; then
          echo "::error::Unit on ${VM} reports non-active state. Output: ${MSG}"
          exit 1
        fi
        if [[ "$ACTIVE" -lt "$EXPECTED" ]]; then
          echo "::error::Expected ${EXPECTED} active units on ${VM}, found ${ACTIVE}. Output: ${MSG}"
          exit 1
        fi
