name: 'WIF Azure Login'
description: |
  Authenticates the GitHub Actions runner to Azure via Workload Identity
  Federation. Wraps azure/login@v2 with the Three Cubes convention of
  reading client/tenant/subscription IDs from repository variables (not
  secrets — WIF doesn't need any).

  Prereqs (provisioned via infra/bicep/ci-deploy-identity.bicep):
    - User-assigned MI exists in Azure
    - Federated credential bound to repo + ref + (optional) environment
    - Repo variables AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID

  Usage (replace {{ ... }} with the literal GitHub-Actions expression
  syntax — it's been de-templated here so the action.yml parser doesn't try
  to evaluate the docstring):
    - uses: three-cubes/tc-pipelines/.github/actions/wif-azure-login@v1
      with:
        client-id:       {{ vars.AZURE_CLIENT_ID }}
        tenant-id:       {{ vars.AZURE_TENANT_ID }}
        subscription-id: {{ vars.AZURE_SUBSCRIPTION_ID }}

inputs:
  client-id:
    description: User-assigned MI client ID (typically vars.AZURE_CLIENT_ID)
    required: true
  tenant-id:
    description: Azure AD tenant ID (typically vars.AZURE_TENANT_ID)
    required: true
  subscription-id:
    description: Subscription ID to set as default (typically vars.AZURE_SUBSCRIPTION_ID)
    required: true

runs:
  using: composite
  steps:
    - name: Azure login (WIF)
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
      with:
        client-id: ${{ inputs.client-id }}
        tenant-id: ${{ inputs.tenant-id }}
        subscription-id: ${{ inputs.subscription-id }}
