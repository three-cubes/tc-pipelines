name: 'Apply on Azure VM via Run-Command'
description: |
  Invokes a bash script on a target Azure VM via `az vm run-command invoke`.
  The script runs as root on the VM. Pairs with snapshot-azure-vm-disk for
  the safe-by-default rollback path.

  Inputs are env-var'd before reaching the run shell (per GitHub Actions
  injection-hardening guidance — workflow_dispatch choice constraints alone
  aren't enough).

  Typical usage:
    - uses: three-cubes/tc-pipelines/.github/actions/apply-on-vm-via-runcommand@v1
      with:
        resource-group: RG-AGENTS-CORE
        vm-name: vm-openclaw
        script: |
          set -e
          export HOME=/root
          cd /data/development/tc-agent-zone
          git pull --ff-only
          bash devsecops/apply/apply-openclaw-config.sh --no-snapshot

  The script payload is treated as a fixed string — DO NOT interpolate
  untrusted GitHub-Actions expression values into it. Use other inputs of
  THIS action if you need parameterisation, then reference them as $VARS
  inside the script body.

inputs:
  resource-group:
    description: Azure resource group containing the VM.
    required: true
  vm-name:
    description: Target VM name.
    required: true
  script:
    description: Bash script body to execute as root on the VM.
    required: true
  fail-on-script-error:
    description: |
      If "true" (default), the action fails when az vm run-command itself
      fails OR when the script's exit code is non-zero. Set to "false" only
      when the script's failure is expected/handled by the caller.
    required: false
    default: 'true'

outputs:
  message:
    description: The 'message' field returned by az vm run-command (script output).
    value: ${{ steps.run.outputs.message }}

runs:
  using: composite
  steps:
    - name: Invoke run-command
      id: run
      shell: bash
      env:
        RG: ${{ inputs.resource-group }}
        VM: ${{ inputs.vm-name }}
        SCRIPT_BODY: ${{ inputs.script }}
        FAIL_ON_ERR: ${{ inputs.fail-on-script-error }}
      run: |
        set -euo pipefail
        MSG=$(az vm run-command invoke \
          --resource-group "$RG" \
          --name "$VM" \
          --command-id RunShellScript \
          --scripts "$SCRIPT_BODY" \
          --query 'value[0].message' -o tsv) || RC=$?
        RC=${RC:-0}
        echo "----- BEGIN run-command output ($VM) -----"
        echo "$MSG"
        echo "----- END run-command output ($VM) -----"
        MSG_FILE=$(mktemp)
        printf '%s\n' "$MSG" >"$MSG_FILE"
        trap 'rm -f "$MSG_FILE"' EXIT
        # az vm run-command exits 0 even when the *script* failed — gate the
        # returned value[0].message so "Enable succeeded" cannot mask stderr
        # failures from the script body.
        if [[ "$FAIL_ON_ERR" == "true" ]]; then
          if ! python3 "$GITHUB_ACTION_PATH/../../../governance/scripts/run_command_output_gate.py" "$MSG_FILE" --label "apply script on ${VM}"; then
            echo "::error::Apply script on ${VM} reported failure in output (see above)."
            exit 1
          fi
        fi
        if [[ "$RC" -ne 0 ]]; then
          echo "::error::az vm run-command exited with code ${RC} for ${VM}"
          exit "$RC"
        fi
        {
          echo "message<<EOF"
          echo "$MSG"
          echo "EOF"
        } >>"$GITHUB_OUTPUT"
