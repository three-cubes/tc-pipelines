# Pre-commit — Golden Path baseline (template).
# Install: pre-commit install
#
# The cheap local gate that catches the obvious things BEFORE the CI round-trip.
# The canonical heavy gate is the fitness engine (`uv run tc-fitness run`, which
# both CI and `make check` invoke). Add repo-specific local hooks below as
# needed (e.g. a `tc-fitness run --staged` hook, bicep build, eslint).

repos:
  # ── General file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  # ── Secret detection ──────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # ── GitHub Actions workflow lint ──────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  # ── Shell-script linting ──────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # ── Python lint + format (ruff; reads pyproject.toml [tool.ruff]) ──────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Python security (bandit; skips + floor match [tool.bandit]) ────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [--severity-level=medium, --confidence-level=medium, --skip=B101,B603,B607]
        files: \.py$
        exclude: ^(tests/|.*test_.*\.py$)

  # ── No AI/LLM self-attribution in the commit message (Autonomous Delivery D1)
  # Runs at the commit-msg stage (needs: pre-commit install --hook-type commit-msg).
  # Strips whole attribution lines in place, hard-rejects non-strippable residue.
  # Single-sources detection off tc-fitness no_llm_attribution (SGO-156) so the
  # local hook, CI reject leg (SGO-160), and the fitness gate never drift.
  - repo: local
    hooks:
      - id: tc-no-attribution
        name: strip AI/LLM self-attribution from the commit message
        entry: governance/git-hooks/commit-msg
        language: script
        stages: [commit-msg]
        always_run: true
